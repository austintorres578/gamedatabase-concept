<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameDB — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>
<header class="site-header scrolled" id="siteHeader">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-icon">◈</span><span class="logo-text">GameDB</span></a>
    <nav class="nav-links"><a href="index.html" class="nav-link">Home</a><a href="search.html" class="nav-link">Search</a></nav>
    <div class="nav-actions"><a href="signup.html" class="btn-accent-sm">Sign up free</a></div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
</header>
<nav class="mobile-nav" id="mobileNav"><a href="index.html" class="nav-link">Home</a><a href="search.html" class="nav-link">Search</a></nav>

<main class="auth-shell">
  <div class="auth-bg"><div class="auth-glow-1"></div><div class="auth-glow-2"></div></div>
  <div class="auth-card">
    <div class="auth-logo-wrap"><span class="logo-icon" style="font-size:2rem">◈</span></div>
    <div class="auth-header"><h1>Welcome back</h1><p>Sign in to your GameDB account</p></div>
    <form class="auth-form" id="signinForm" onsubmit="handleSignIn(event)">
      <div class="auth-field">
        <label class="auth-label" for="email">Email</label>
        <input class="auth-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
        <span class="auth-error-msg" id="emailErr">Please enter a valid email</span>
      </div>
      <div class="auth-field">
        <div class="auth-label-row">
          <label class="auth-label" for="password">Password</label>
          <a href="#" class="auth-link">Forgot password?</a>
        </div>
        <input class="auth-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <span class="auth-error-msg" id="passErr">Password must be at least 6 characters</span>
      </div>
      <button type="submit" class="btn-accent" id="submitBtn" style="width:100%;margin-top:0.5rem">Sign in</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="signup.html" class="auth-link">Create one free →</a></p>
  </div>
</main>

<script src="shared.js"></script>
<script>
function handleSignIn(e) {
  e.preventDefault();
  const email = document.getElementById('email');
  const pass = document.getElementById('password');
  const emailErr = document.getElementById('emailErr');
  const passErr = document.getElementById('passErr');
  let valid = true;
  // reset
  [email, pass].forEach(i => i.classList.remove('error'));
  [emailErr, passErr].forEach(m => m.classList.remove('show'));

  if (!email.value || !email.value.includes('@')) {
    email.classList.add('error'); emailErr.classList.add('show'); valid = false;
  }
  if (!pass.value || pass.value.length < 6) {
    pass.classList.add('error'); passErr.classList.add('show'); valid = false;
  }
  if (!valid) return;

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  setTimeout(() => {
    btn.textContent = 'Sign in'; btn.disabled = false;
    GameDB.toast('Welcome back!', 'You have been signed in successfully', 'success');
    setTimeout(() => { window.location.href = 'profile.html'; }, 1000);
  }, 1200);
}
</script>
</body>
</html>
